services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medis_backend
    restart: always
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medis_frontend
    restart: always
    ports:
      - "3000:80"

